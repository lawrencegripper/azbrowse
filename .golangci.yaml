version: 2
run:
  deadline: 5m
  skip-files: []
linters-settings:
  gosec:
    excludes:
      # Error types not being check is covered by other linters
      - G104
      - G307
      # Azb invokes commands / read files on the users behalf. As it runs under the users identity on their machine
      # I think the impact of passing user input is minimal. See: #351
      - G304
      - G204
  govet:
    enable:
      - shadow
  gocyclo:
    min-complexity: 12
  maligned:
    suggest-new: true
  goconst:
    min-len: 3
    min-occurrences: 3
  misspell:
    locale: US
    ignore-words:
      - listend
      - analyses
linters:
  # We only want to enable specific linters for compatibility with old code
  # These were the ones enabled in the previous version
  enable-all: false
  enable:
    - revive
    - unused
    - misspell
    - errcheck
    - govet
    - ineffassign
    - gosec
  # We specifically disable staticcheck to avoid new errors
  disable:
    - staticcheck
