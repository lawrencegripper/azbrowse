version: 2
run:
  deadline: 5m
  skip-files: []
linters-settings:
  gosec:
    excludes:
      # Error types not being check is covered by other linters
      - G104
      - G307
      # Azb invokes commands / read files on the users behalf. As it runs under the users identity on their machine
      # I think the impact of passing user input is minimal. See: #351
      - G304
      - G204
  govet:
    enable:
      - shadow
  gocyclo:
    min-complexity: 12
  maligned:
    suggest-new: true
  goconst:
    min-len: 3
    min-occurrences: 3
  misspell:
    locale: US
    ignore-words:
      - listend
      - analyses
linters:
  # Enable specific linters
  enable:
    - revive
    - unused
    - misspell
    - errcheck
    - govet
    - ineffassign
    - gosec
  # Explicitly disable staticcheck to avoid new errors
  disable:
    - staticcheck
issues:
  exclude-use-default: false
  max-per-linter: 0
  max-same-issues: 0
  exclude: []
  exclude-rules:
    - text: "package-comments: should have a package comment"
      linters: 
        - revive
      #Ignore gocui funcs
    - text: Error return value of `g.DeleteView` is not checked
      linters:
        - errcheck
    - text: Error return value of `g.SetCurrentView` is not checked
      linters:
        - errcheck
    - text: Error return value of `*.SetCursor` is not checked
      linters:
        - errcheck
    # Ignore fmt.Fprint* errors in UI code
    - text: Error return value of `fmt.Fprint` is not checked
      linters:
        - errcheck
    - text: Error return value of `fmt.Fprintln` is not checked
      linters:
        - errcheck
      #Ignore shadowed err and ctx variables
    - text: declaration of "err" shadows declaration at
      linters:
        - govet
    - text: declaration of "ctx" shadows declaration at
      linters:
        - govet
      #Ignore comments for KeyBinding Handler funcs
    - path: internal/pkg/keybindings/listhandlers.go
      linters:
        - revive
    - path: internal/pkg/keybindings/commandpanelhandlers.go
      linters:
        - revive
    - path: internal/pkg/keybindings/itemhandlers.go
      linters:
        - revive
    - path: internal/pkg/keybindings/globalhandlers.go
      linters:
        - revive
    - path: internal/pkg/*
      linters:
        - revive
  # Allow referring to disabled linters in nolint directives
  allow-unused-ignores: true
